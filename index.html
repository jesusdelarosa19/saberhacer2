<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venta de Carros PRO</title>
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.75rem;
      background: radial-gradient(circle at 20% 20%, #2d3748, #000000 60%);
      color: #ffffff;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-100 to-gray-300 min-h-screen">

<div id="splash" aria-live="polite" aria-label="Cargando aplicación">
  <div class="text-4xl">🚗</div>
  <h1 class="text-2xl font-bold tracking-wide">Venta de Carros PRO</h1>
  <div class="spinner" aria-hidden="true"></div>
  <p class="text-sm opacity-90">Cargando inventario...</p>
</div>

<header class="bg-black text-white p-5 text-center text-3xl font-bold shadow-lg">
  🚗 Venta de Carros PRO
</header>

<div id="toastContainer" class="fixed top-4 right-4 z-[10000] space-y-2 w-[92%] max-w-sm"></div>

<div id="downloadAlert" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 bg-black text-white px-4 py-3 rounded-xl shadow-2xl z-[10000] w-[92%] max-w-xl">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <p class="text-sm sm:text-base">La app esta lista para descargarse en tu dispositivo.</p>
    <button id="installBtn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm">Descargar</button>
  </div>
</div>

<div class="p-6 max-w-6xl mx-auto">

  <!-- LOGIN -->
  <div id="loginBox" class="bg-white p-8 rounded-2xl shadow-xl max-w-md mx-auto">
    <h2 class="text-2xl font-bold mb-6 text-center">Iniciar sesión</h2>
    <input id="user" type="text" placeholder="Usuario" class="border p-3 w-full mb-3 rounded-lg">
    <input id="pass" type="password" placeholder="Contraseña" class="border p-3 w-full mb-4 rounded-lg">
    <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-lg">Entrar</button>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">

    <!-- CATÁLOGO -->
    <div class="mb-8">
      <h2 class="text-2xl font-bold mb-4">🔥 Catálogo Destacado</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="bg-white rounded-xl shadow p-4">
          <h3 class="font-bold">BMW M3</h3>
          <p class="text-gray-600">Deportivo premium</p>
          <p class="text-green-600 font-bold">$1,200,000</p>
        </div>
        <div class="bg-white rounded-xl shadow p-4">
          <h3 class="font-bold">Audi A4</h3>
          <p class="text-gray-600">Elegancia y potencia</p>
          <p class="text-green-600 font-bold">$950,000</p>
        </div>
        <div class="bg-white rounded-xl shadow p-4">
          <h3 class="font-bold">Mustang GT</h3>
          <p class="text-gray-600">Muscle car</p>
          <p class="text-green-600 font-bold">$1,100,000</p>
        </div>
      </div>
    </div>

    <!-- BARRA DE HERRAMIENTAS -->
    <div class="bg-white p-6 rounded-2xl shadow-xl mb-8">
      <div class="flex flex-col md:flex-row gap-4 items-stretch md:items-end">
        <input id="nombre" placeholder="Nombre del auto" class="border p-3 rounded-lg flex-1">
        <input id="precio" placeholder="Precio" class="border p-3 rounded-lg flex-1">
        <button onclick="agregarAuto()" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700">Agregar</button>
        <button onclick="logout()" class="bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700">Salir</button>
      </div>
    </div>

    <!-- INVENTARIO -->
    <h2 class="text-2xl font-bold mb-4">📦 Inventario</h2>
    <div id="cars" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  </div>

</div>

<script>
let autos = JSON.parse(localStorage.getItem('autos')) || [
  { nombre: "Toyota Corolla", precio: 250000 },
  { nombre: "Nissan Sentra", precio: 280000 }
];

let deferredPrompt = null;

function mostrarAlerta(mensaje, tipo = 'info', duracion = 2600) {
  const container = document.getElementById('toastContainer');
  if (!container) return;

  const colores = {
    success: 'bg-green-600 text-white',
    error: 'bg-red-600 text-white',
    warning: 'bg-amber-500 text-black',
    info: 'bg-blue-600 text-white'
  };

  const toast = document.createElement('div');
  toast.className = `${colores[tipo] || colores.info} px-4 py-3 rounded-xl shadow-xl text-sm transition-opacity duration-300`;
  toast.textContent = mensaje;
  container.appendChild(toast);

  setTimeout(() => {
    toast.classList.add('opacity-0');
    setTimeout(() => toast.remove(), 300);
  }, duracion);
}

function ocultarSplash(){
  const splash = document.getElementById('splash');
  if(!splash) return;

  splash.classList.add('hide');
  setTimeout(() => {
    splash.style.display = 'none';
  }, 420);
}

function guardarAutos(){
  localStorage.setItem('autos', JSON.stringify(autos));
}

function refrescarAutos(){
  autos = JSON.parse(localStorage.getItem('autos')) || autos;
  renderAutos();
}

function login(){
  const user = document.getElementById('user').value;
  const pass = document.getElementById('pass').value;

  if(user === 'admin' && pass === '1234'){
    localStorage.setItem('authUser', user);
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('user').value = '';
    document.getElementById('pass').value = '';
    renderAutos();
    mostrarAlerta('Sesion iniciada correctamente', 'success');
  } else {
    mostrarAlerta('Datos incorrectos', 'error');
  }
}

function logout(){
  localStorage.removeItem('authUser');
  document.getElementById('loginBox').style.display = 'block';
  document.getElementById('app').classList.add('hidden');
  document.getElementById('user').value = '';
  document.getElementById('pass').value = '';
  document.getElementById('user').focus();
  mostrarAlerta('Sesion cerrada correctamente', 'info');
}

function verificarAutenticacion(){
  const userId = localStorage.getItem('authUser');
  if(userId){
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('app').classList.remove('hidden');
    renderAutos();
  }
}

function renderAutos(){
  const container = document.getElementById('cars');
  container.innerHTML = '';

  autos.forEach((auto, index) => {
    const div = document.createElement('div');
    div.className = "bg-white rounded-2xl shadow-xl overflow-hidden";

    div.innerHTML = `
      <div class="h-40 bg-gray-200 flex items-center justify-center">🚘</div>
      <div class="p-4">
        <h2 class="font-bold text-xl">${auto.nombre}</h2>
        <p class="text-green-600 font-semibold">$${auto.precio}</p>
        <div class="flex justify-between mt-3">
          <button onclick="comprar('${auto.nombre}')" class="bg-blue-500 text-white px-3 py-1 rounded">Comprar</button>
          <button onclick="eliminarAuto(${index})" class="bg-red-500 text-white px-3 py-1 rounded">Eliminar</button>
        </div>
      </div>
    `;
    container.appendChild(div);
  });

  guardarAutos();
}

function agregarAuto(){
  const nombreInput = document.getElementById('nombre');
  const precioInput = document.getElementById('precio');
  const nombre = nombreInput.value.trim();
  const precio = Number(precioInput.value);

  if(nombre && precio > 0){
    autos.push({ nombre, precio });
    guardarAutos();
    refrescarAutos();
    nombreInput.value = '';
    precioInput.value = '';
    nombreInput.focus();
    mostrarAlerta('Auto agregado al inventario', 'success');
  } else {
    mostrarAlerta('Ingresa un nombre y un precio valido mayor a 0', 'warning');
  }
}

function eliminarAuto(index){
  const nombre = autos[index]?.nombre;
  autos.splice(index, 1);
  guardarAutos();
  refrescarAutos();
  mostrarAlerta(`Auto eliminado: ${nombre || 'sin nombre'}`, 'warning');
}

function comprar(nombre){
  mostrarAlerta('Compra realizada: ' + nombre, 'success');
}

async function instalarApp(){
  if (!deferredPrompt) {
    mostrarAlerta('La instalacion aun no esta disponible', 'info');
    return;
  }

  deferredPrompt.prompt();
  const choice = await deferredPrompt.userChoice;

  if (choice.outcome === 'accepted') {
    mostrarAlerta('Descarga iniciada correctamente', 'success');
  } else {
    mostrarAlerta('Descarga cancelada por el usuario', 'warning');
  }

  deferredPrompt = null;
  document.getElementById('downloadAlert').classList.add('hidden');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(registration => {
    registration.addEventListener('updatefound', () => {
      const newWorker = registration.installing;
      if (!newWorker) return;

      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          mostrarAlerta('Nueva version descargada. Recarga para actualizar.', 'info', 4200);
        }
      });
    });
  });
}

window.addEventListener('beforeinstallprompt', event => {
  event.preventDefault();
  deferredPrompt = event;
  document.getElementById('downloadAlert').classList.remove('hidden');
  mostrarAlerta('Descarga disponible: puedes instalar la app', 'info', 3400);
});

window.addEventListener('appinstalled', () => {
  document.getElementById('downloadAlert').classList.add('hidden');
  mostrarAlerta('Instalacion completada con exito', 'success');
});

document.getElementById('installBtn').addEventListener('click', instalarApp);

window.addEventListener('storage', event => {
  if (event.key === 'autos') {
    refrescarAutos();
    mostrarAlerta('Inventario actualizado desde otra pestana', 'info');
  }
});

window.addEventListener('load', () => {
  verificarAutenticacion();
  setTimeout(ocultarSplash, 1200);
});
</script>

</body>
</html>
